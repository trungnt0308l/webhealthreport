name = "webhealthreport-scheduler"
compatibility_date = "2024-09-23"
main = "index.js"

[triggers]
crons = ["*/15 * * * *"]  # every 15 min — paid plan allows up to every minute

[[d1_databases]]
binding = "DB"
database_name = "webhealthreport"
database_id = "c379e50c-5790-46da-88fa-83c5b82ebeb0"

[[queues.producers]]
binding = "SCAN_QUEUE"
queue   = "webhealthreport-scans"

[[queues.consumers]]
queue              = "webhealthreport-scans"
max_batch_size     = 1
max_batch_timeout  = 30
max_retries        = 100    # Cloudflare max; each retry processes one batch (~30 subrequests)
dead_letter_queue  = "webhealthreport-scans-dlq"
max_concurrency    = 20

[[queues.consumers]]
queue          = "webhealthreport-scans-dlq"
max_batch_size = 10

[vars]
FROM_EMAIL = "reports@aisecurityradar.com"   # ← fill in before deploying

[secrets]
# RESEND_API_KEY — wrangler secret put RESEND_API_KEY
# MONITOR_SECRET — wrangler secret put MONITOR_SECRET
